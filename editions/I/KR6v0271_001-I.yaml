body:
  text: 曦望晷速三曜不停春還秋往陰陽貿遷有始將終有生必滅唯无上大覺體宿常湛故使人知覆護勿識皈依是乃佛弟子宋敬業崔海寶郭小德張燕子等洞識苦空淵知八解兼識財稱不聚身名假合見蘆葦之空虛知芭蕉之匪實何以逢除厚彰輕拔无明方欲寄煎三毒之苦永入解脫之門因茲勝地建无上之功大齊天保九年歲次戊寅三月甲午朔六日癸亥仰為廣固南寺大眾等敬造寶塔一區万刃名山峭崿峙其北清淵淥池遄流旋其前神仙之宮詎得方其麗踴出鑽天可以比其暉崇斯福仰資七世儗入閑門龍登初會拔潤現存超位帝祚長延法界蒙澤若不刊石流芳易滅其頌曰灼法炬晃朗慧日悟彼迷徒出茲闇室門稱不二義唯歸一位登无上果緣周畢麗同玉室似銀宮彫曦漏月鐸嚮從風將如地踊若現空中恃斯勝善同履虛沖
